name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions/setup-rust@v2
        with:
          rust-version: stable
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Lint with Clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test --quiet